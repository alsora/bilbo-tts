schema_version: book-config/v1
book_id: tiny-latex
language: it
input:
  format: latex
  path: source/main.tex
metadata:
  title: Piccolo libro LaTeX
  author: Ada Autrice
normalization:
  version: it-v1
  lexicons: []
chunking:
  max_characters: 160
synthesis:
  model_config_path: config/qualification/fake.yaml
verification:
  model_config_path: config/qualification/asr.yaml
  max_auto_retries: 2
assembly:
  pauses:
    sentence_ms: 250
    paragraph_ms: 600
    chapter_ms: 1500
  loudness_lufs: -18
  true_peak_db: -2
