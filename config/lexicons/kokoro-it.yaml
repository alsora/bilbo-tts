schema_version: pronunciation-lexicon/v1
lexicon_id: kokoro-it
entries:
  - entry_id: loanword-buy-and-hold
    mode: literal
    pattern: buy and hold
    spoken: bài ènd òld
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng reads buy with Italian letter rules as bui; the respelling yields the aI diphthong.
  - entry_id: loanword-duration
    mode: literal
    pattern: duration
    spoken: durèscion
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng reads duration as Italian duratjon; the reviewed Italianized rendering was preferred over a closer English one.
  - entry_id: vowel-valeva
    mode: literal
    pattern: valeva
    spoken: valéva
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed e; standard Italian uses the closed e of the -éva imperfect ending.
  - entry_id: vowel-confrontano
    mode: literal
    pattern: confrontano
    spoken: confróntano
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed o; standard Italian uses a closed o.
  - entry_id: compound-sessantasette
    mode: literal
    pattern: sessantasette
    spoken: sessanta-sette
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng voices the compound-internal s and closes the stressed e; the hyphen restores voiceless s and open e. Catches literals and currency, date, percentage, and ratio expansions, but not generic integer expansion, which runs after lexicons.
  - entry_id: stress-desideri
    mode: literal
    pattern: desideri
    spoken: desidèri
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng uses the verb stress desìderi; this book uses the noun desidèri. A second-person verb occurrence would be respelled wrongly, so review if the text ever addresses the reader with this form.
  - entry_id: vowel-trovano
    mode: literal
    pattern: trovano
    spoken: tròvano
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng closes the stressed o; standard Italian uses the open o of trovare.
