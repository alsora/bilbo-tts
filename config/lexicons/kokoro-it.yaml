schema_version: pronunciation-lexicon/v1
lexicon_id: kokoro-it
entries:
  - entry_id: loanword-buy-and-hold
    mode: literal
    pattern: buy and hold
    spoken: bài ènd òld
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng reads buy with Italian letter rules as bui; the respelling yields the aI diphthong.
  - entry_id: loanword-duration
    mode: literal
    pattern: duration
    spoken: durèscion
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng reads duration as Italian duratjon; the reviewed Italianized rendering was preferred over a closer English one.
  - entry_id: loanword-wall-street
    mode: literal
    pattern: Wall Street
    spoken: uòl strìtt
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The Italianized rendering avoids Kokoro's strongly English rhotic and long vowels; the doubled final t keeps the release audible.
  - entry_id: loanword-go-kart
    mode: literal
    pattern: go-kart
    spoken: go-kartt
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The doubled final t keeps the release audible instead of reducing the loanword to go-car.
  - entry_id: homograph-principi
    mode: literal
    pattern: principi
    spoken: princìpi
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng defaults to prìncipi meaning princes; the reviewed text uses only princìpi meaning principles.
  - entry_id: vowel-riflettere
    mode: literal
    pattern: riflettere
    spoken: riflèttere
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng closes the stressed e; standard Italian uses an open e.
  - entry_id: stress-siano
    mode: literal
    pattern: siano
    spoken: sìano
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The explicit accent prevents Kokoro from shifting or overextending the stressed vowel.
  - entry_id: stress-maggior
    mode: literal
    pattern: maggior
    spoken: maggiór
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The explicit accent fixes Kokoro's inconsistent rendering of the apocopated comparative.
  - entry_id: vowel-vedremo
    mode: literal
    pattern: vedremo
    spoken: vedrémo
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed e; standard Italian uses the closed e of the future ending.
  - entry_id: vowel-ordine
    mode: literal
    pattern: ordine
    spoken: órdine
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed o; standard Italian uses a closed o.
  - entry_id: vowel-costosi
    mode: literal
    pattern: costosi
    spoken: costósi
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed o; standard Italian uses a closed o.
  - entry_id: consonant-azienda
    mode: literal
    pattern: azienda
    spoken: ad-ziènda
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The marker receives a reviewed voiced dz sequence in the Kokoro adapter, avoiding both the weak ordinary onset and an overlong affricate.
  - entry_id: consonant-aziende
    mode: literal
    pattern: aziende
    spoken: ad-ziènde
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The marker receives a reviewed voiced dz sequence in the Kokoro adapter, avoiding both the weak ordinary onset and an overlong affricate.
  - entry_id: consonant-meglio
    mode: literal
    pattern: meglio
    spoken: mèllio
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The marker receives a reviewed long palatal lateral in the Kokoro adapter instead of the glide-like mejo rendering.
  - entry_id: consonant-impegnandosi
    mode: literal
    pattern: impegnandosi
    spoken: impegnando-si
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The marker receives the reviewed voiceless pronoun s without adding a second stress in the Kokoro adapter.
  - entry_id: compound-centoventisette
    mode: literal
    pattern: centoventisette
    spoken: centoventissètte
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The marker receives a reviewed voiceless s and open stressed e in the Kokoro adapter.
  - entry_id: vowel-duemiladiciannove
    mode: literal
    pattern: duemiladiciannove
    spoken: duemiladiciannòve
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: The explicit accent selects the reviewed open stressed o in the year 2019.
  - entry_id: vowel-valeva
    mode: literal
    pattern: valeva
    spoken: valéva
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed e; standard Italian uses the closed e of the -éva imperfect ending.
  - entry_id: vowel-confrontano
    mode: literal
    pattern: confrontano
    spoken: confróntano
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng chooses an open stressed o; standard Italian uses a closed o.
  - entry_id: compound-sessantasette
    mode: literal
    pattern: sessantasette
    spoken: sessanta-sette
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng voices the compound-internal s and closes the stressed e; the hyphen restores voiceless s and open e.
  - entry_id: compound-seicento
    mode: regex
    pattern: (?<=[aeiou])seicento
    spoken: -seicento
    priority: 50
    case_sensitive: false
    word_boundaries: false
    notes: espeak-ng voices the compound-internal s of seicento after a vowel, as in milleseicento; the hyphen restores the voiceless s while standalone seicento is already correct.
  - entry_id: stress-eroderne
    mode: literal
    pattern: eroderne
    spoken: eròderne
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng stresses the enclitic syllable as erodèrne; the explicit accent restores the open stressed o of erodere.
  - entry_id: vowel-bot
    mode: literal
    pattern: bot
    spoken: bòt
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng closes the o of the loanword bot; Italian usage has an open o. Also catches the finance lexicon's BOT-as-word replacement, which runs first at higher priority.
  - entry_id: stress-desideri
    mode: literal
    pattern: desideri
    spoken: desidèri
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng uses the verb stress desìderi; this book uses the noun desidèri. A second-person verb occurrence would be respelled wrongly, so review if the text ever addresses the reader with this form.
  - entry_id: vowel-trovano
    mode: literal
    pattern: trovano
    spoken: tròvano
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: espeak-ng closes the stressed o; standard Italian uses the open o of trovare.
  - entry_id: consonant-zero
    mode: literal
    pattern: zero
    spoken: dzzèro
    priority: 50
    case_sensitive: false
    word_boundaries: true
    notes: Kokoro weakens its ordinary zero onset toward s and renders a text-only d-plus-affricate override too strongly; this marker receives the reviewed dz phoneme sequence in the Kokoro adapter.
